<!DOCTYPE html>
<html>
<head>
  <title>AI Detector Pro</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(15px);
      padding: 30px;
      border-radius: 20px;
      width: 400px;
      text-align: center;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    h2 {
      margin-bottom: 15px;
    }

    textarea {
      width: 100%;
      height: 120px;
      border-radius: 10px;
      border: none;
      padding: 10px;
      margin-bottom: 15px;
      outline: none;
    }

    button {
      background: linear-gradient(45deg, #22c55e, #4ade80);
      border: none;
      padding: 10px 20px;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      opacity: 0.9;
    }

    #result {
      margin-top: 15px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>AI Detector Pro</h2>

  <textarea id="text" placeholder="Paste your text here..."></textarea>

  <button onclick="detect()">Analyze</button>

  <div id="result"></div>
</div>

<script>
function detect() {
  let text = document.getElementById("text").value;
  let result = document.getElementById("result");

  if (text.length < 20) {
    result.innerHTML = "Please enter more text.";
    return;
  }

  result.innerHTML = "Analyzing...";

  setTimeout(() => {
    let score = Math.floor((text.split(' ').length * 7) % 100);

    if (score > 60) {
      result.innerHTML = "AI Generated: " + score + "%";
    } else {
      result.innerHTML = "Human Written: " + (100 - score) + "%";
    }
  }, 1200);
}
</script>

</body>
</html>
