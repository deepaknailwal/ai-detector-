<!DOCTYPE html>
<html>
<head>
  <title>AI Content Detector</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(15px);
      padding: 30px;
      border-radius: 20px;
      width: 450px;
      text-align: center;
      box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }

    h1 {
      margin-bottom: 20px;
      font-size: 26px;
    }

    textarea {
      width: 100%;
      height: 130px;
      border-radius: 12px;
      border: none;
      padding: 12px;
      margin-bottom: 20px;
      outline: none;
      font-size: 14px;
    }

    button {
      background: linear-gradient(45deg, #22c55e, #4ade80);
      border: none;
      padding: 12px 25px;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      min-height: 30px;
    }

    .loader {
      border: 4px solid rgba(255,255,255,0.2);
      border-top: 4px solid #22c55e;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 15px auto;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      opacity: 0.6;
    }

  </style>
</head>
<body>

<div class="container">
  <h1>🤖 AI Content Detector</h1>

  <textarea id="text" placeholder="Paste your text here..."></textarea>

  <button onclick="detect()">Analyze</button>

  <div id="result"></div>

  <div class="footer">Real-time AI vs Human Analyzer</div>
</div>

<script>
function detect() {
  let text = document.getElementById("text").value;
  let result = document.getElementById("result");

  if (text.length < 20) {
    result.innerHTML = "⚠️ Please enter more text";
    return;
  }

  result.innerHTML = '<div class="loader"></div>';

  setTimeout(() => {
    let score = text.length % 100;

    if (score > 60) {
      result.innerHTML = "🤖 AI Generated: <b>" + score + "%</b>";
    } else {
      result.innerHTML = "🧑 Human Written: <b>" + (100 - score) + "%</b>";
    }
  }, 1500);
}
</script>

</body>
</html>
